server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: try .html version
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Cache static assets
    location /_next/static {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /avatars/ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
